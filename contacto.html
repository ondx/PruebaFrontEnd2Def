<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width , initial-scale=1.0">
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx" crossorigin="anonymous"></script>
    <title>La Prueba</title>
</head>
<body>
    <nav class="navbar navbar-expand-md navbar-dark bg-dark fixed-top">
        <div class="container-fluid">
          <a class="navbar-brand" href="#">La Prueba</a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse flex-row-reverse" id="navbarNav">
            <ul class="navbar-nav">
              <li>
                  <a href="/index.html" id="boton-contacto" class="btn btn-light btn-md" tabindex="-1" role="button" aria-disabled="true">Home</a>
              </li>
            </ul>
          </div>
        </div>
    </nav>
    <main>
        <div style="margin-top: 90px;" class="container p-3 bg-dark text-white" >
            <h3>Contactanos </h3>
            <form id="contactForm">
                <div class="container p-2 mb-1 bg-dark text-white">
                    <label class="form-label" for="name">Nombre</label>
                    <input class="form-control" id="name" type="text" placeholder="Ej.: Elvis Tek" />
                </div>
                <div class="container p-2 mb-1 bg-dark text-white">
                    <label class="form-label" for="emailAddress">Correo Electronico</label>
                    <input class="form-control" id="emailAddress" type="email" placeholder="correo@ejemplo.com" />
                </div>
                <div class="container p-2 mb-1 bg-dark text-white">
                    <label class="form-label" for="message">Asunto</label>
                    <textarea class="form-control" id="message" type="text" placeholder="Escribanos su mensaje" style="height: 10rem;"></textarea>
                </div>
                <div class="container p-2 mb-1 bg-dark text-white">
                    <button class="btn btn-primary btn-lg" type="submit">Enviar</button>
                </div>
            </form>
        </div>
    </main>
    <footer class="container-fluid text-center text-white position-fixed bottom-0">
        <div class="text-center p-3 bg-dark">
          <a style="text-decoration: none;" class="text-white" href="/nggyu.html">Made with ❤️ by Pablo Arriagada and Elias Zuñiga</a>
        </div>
    </footer>
</body>
